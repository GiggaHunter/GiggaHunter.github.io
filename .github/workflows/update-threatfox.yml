name: Update ThreatFox Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch ThreatFox IOCs
        run: |
          curl -s -X POST https://threatfox-api.abuse.ch/api/v1/ \
            -H "Content-Type: application/json" \
            -H "Auth-Key: ${{ secrets.THREATFOX_API_KEY }}" \
            -d '{"query":"get_iocs","days":1}' \
            -o raw.json
          
          echo "Raw response preview:"
          head -c 500 raw.json
          echo ""
          
          python3 -c "
          import json, sys
          d = json.load(open('raw.json'))
          
          # Handle array format
          if isinstance(d, list):
              print('Format: array, length:', len(d))
              if len(d) > 0:
                  # Wrap in standard format
                  wrapped = {'query_status': 'ok', 'data': d}
                  json.dump(wrapped, open('threatfox-data.json', 'w'))
                  print('Saved as wrapped object')
                  sys.exit(0)
          
          # Handle object format
          if isinstance(d, dict):
              if 'error' in d:
                  print('ERROR:', d['error'])
                  sys.exit(1)
              if d.get('query_status') == 'ok' and d.get('data'):
                  data = d['data']
                  count = len(data) if isinstance(data, list) else len(list(data.keys()))
                  print('OK - IOCs:', count)
                  import shutil
                  shutil.copy('raw.json', 'threatfox-data.json')
                  sys.exit(0)
          
          print('Unknown format:', type(d))
          sys.exit(1)
          " && echo "Done" || echo "Skipped - keeping old data"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add threatfox-data.json
          git diff --staged --quiet || git commit -m "chore: update ThreatFox data [skip ci]"
          git push
