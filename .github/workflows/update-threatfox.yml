name: Update ThreatFox Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch ThreatFox IOCs
        run: |
          curl -s -X POST https://threatfox-api.abuse.ch/api/v1/ \
            -H "Content-Type: application/json" \
            -d '{"query":"get_iocs","days":1}' \
            -o threatfox-data.json
          echo "Done: $(wc -c < threatfox-data.json) bytes"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add threatfox-data.json
          git diff --staged --quiet || git commit -m "chore: update ThreatFox data [skip ci]"
          git push
